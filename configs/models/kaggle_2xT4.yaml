# configs/models/kaggle_2xT4.yaml
#
# Kaggle 2× Tesla T4 (2×16GB = 32GB total VRAM) optimized config.
#
# Hardware allocation strategy:
#   GPU0 (cuda:0): YOLO + ByteTrack + CLIP (Tier-1 perception)
#   GPU1 (cuda:1): Qwen2.5-VL-7B           (Tier-2/3 reasoning)
#
# This heterogeneous allocation prevents contention between
# the high-frequency perception loop and the on-demand VLM calls.
#
# Usage:
#   python scripts/run_pipeline.py \
#       --video video.mp4 \
#       --policy threshold \
#       --device cuda:0 \
#       --vlm qwen_7b \
#       --vlm_device cuda:1 \
#       --experiment_name kaggle_qwen7b

detector:
  model: yolov8n.pt
  conf_threshold: 0.30
  device: cuda:0            # GPU0 — perception

tracker:
  tracker_type: bytetrack
  track_thresh: 0.30
  track_buffer: 30
  match_thresh: 0.80
  frame_rate: 30

embeddings:
  model: ViT-B/32
  device: cuda:0            # GPU0 — alongside YOLO
  normalize: true

semantic_memory:
  decay_lambda: 0.90
  embedding_dim: 512

drift:
  alpha: 0.50
  beta: 0.30
  gamma: 0.20

policy:
  name: threshold
  tau_low: 0.15
  tau_high: 0.40

scheduler:
  force_every_n: 300
  min_interval: 5

cache:
  max_frames_cached: 150

vlm:
  name: qwen_7b             # Qwen2.5-VL-7B — stronger reasoning
  model_id: Qwen/Qwen2.5-VL-7B-Instruct
  device: cuda:1            # GPU1 — dedicated VLM device
  use_4bit: false           # fp16 on T4 fits 7B (~14GB VRAM)
  max_new_tokens: 256

# Alternative: if GPU1 is tight, use 4-bit:
# vlm:
#   name: qwen_7b_4bit
#   device: cuda:1
#   use_4bit: true          # ~9GB VRAM
#   max_new_tokens: 256

# Alternative: 3B for speed experiments
# vlm:
#   name: qwen_3b
#   device: cuda:1
#   max_new_tokens: 128

robotic_layer:
  tau_stable: 0.10
  tau_dynamic: 0.35
